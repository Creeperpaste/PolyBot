<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyBot - Fixed UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <input type="text" id="bot-name" placeholder="Name...">
        <input type="text" id="wiki-url" placeholder="Wiki URL...">
        <button id="build-btn">Create Bot</button>
    </div>

    <div id="chat-history" style="padding-bottom: 100px;">
        <div class="msg ai">System: UI Refreshed. Send button forced to front.</div>
    </div>

    <div id="file-status"></div>

    <div class="footer">
        <input type="file" id="file-input" accept="image/*" hidden>
        <button id="upload-btn" type="button">📎</button>
        <input type="text" id="user-input" placeholder="Type here...">
        <button id="send-btn" type="button">SEND 🚀</button>
    </div>

    <script type="module" src="botLogic.js"></script>
    <script type="module" src="voiceSystem.js"></script>
    <script type="module" src="uiManager.js"></script>
</body>
</html>
